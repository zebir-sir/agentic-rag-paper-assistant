services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_pgvector_main1
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "6544:5432"
    volumes:
      - postgres_data_main1:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_api_main1
    command: uvicorn agent.api:app --host ${APP_HOST} --port ${APP_PORT}
    ports:
      - "8059:8888"
    env_file: .env
    environment:
      STREAM_BACKEND: ${STREAM_BACKEND:-langchain}
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8888/health/live', timeout=3); raise SystemExit(0 if r.status_code == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_ui_main1
    command: streamlit run ui/app.py --server.port=${SERVER_PORT} --server.address=${SERVER_HOST}
    ports:
      - "8502:8501"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_main1:
    driver: local
